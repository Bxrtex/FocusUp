<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusUp — Sign In</title>
  <link rel="stylesheet" href="style.css?v=20260407b" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
    }
    .auth-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .auth-logo-icon {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: #fff;
    }
    .auth-logo span {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--text);
    }
    .auth-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .auth-sub {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 2rem;
    }
    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg3);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 1.5rem;
    }
    .auth-tab {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .auth-tab.active {
      background: var(--bg2);
      color: var(--text);
      font-weight: 500;
    }
    .auth-field {
      margin-bottom: 12px;
    }
    .auth-field label {
      display: block;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 6px;
    }
    .auth-field input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border 0.15s;
    }
    .auth-field input:focus { border-color: var(--accent); }
    .auth-field input::placeholder { color: var(--text3); }
    .auth-submit {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }
    .auth-submit:hover { opacity: 0.9; }
    .auth-error {
      background: var(--red-bg);
      color: var(--red);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
    .auth-error.show { display: block; }
    .auth-success {
      background: var(--green-bg);
      color: var(--green);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
    .auth-success.show { display: block; }
    .loading { opacity: 0.6; pointer-events: none; }
    .auth-meta {
      margin-top: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
      text-align: center;
    }
    .auth-meta span {
      font-size: 12px;
      color: var(--text3);
    }
    .auth-legal-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
    }
    .auth-legal-link {
      color: var(--text2);
      font-size: 13px;
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .auth-legal-link:hover {
      color: var(--accent2);
    }

    @media (max-width: 640px) {
      .auth-wrap {
        align-items: flex-start;
        padding: 1rem;
      }

      .auth-card {
        padding: 1.5rem 1rem;
        border-radius: 12px;
      }

      .auth-logo {
        margin-bottom: 1.5rem;
      }

      .auth-sub {
        margin-bottom: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">F</div>
      <span>FocusUp</span>
    </div>

    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to sync your XP everywhere</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Sign in</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">Sign up</button>
    </div>

    <div class="auth-error" id="auth-error"></div>
    <div class="auth-success" id="auth-success"></div>

    <div id="form-login">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@email.com" />
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="auth-submit" onclick="handleLogin()">Sign in</button>
    </div>

    <div id="form-signup" style="display:none">
      <div class="auth-field">
        <label>Username</label>
        <input type="text" id="signup-username" placeholder="cooluser123" />
      </div>
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@email.com" />
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="min 6 characters" />
      </div>
      <button class="auth-submit" onclick="handleSignup()">Create account</button>
    </div>

    <div class="auth-meta">
      <div class="auth-legal-links">
        <a class="auth-legal-link" href="terms.html">Terms of Service</a>
        <a class="auth-legal-link" href="privacy.html">Privacy Policy</a>
      </div>
      <span>© 2026 FocusUp. All rights reserved.</span>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  function getPageUrl(page) {
    return new URL(page, window.location.href).toString();
  }

  db.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = getPageUrl('index.html');
  });

  function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', ['login','signup'][i] === tab));
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    clearMessages();
  }

  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('auth-success').classList.remove('show');
  }

  function showSuccess(msg) {
    const el = document.getElementById('auth-success');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('auth-error').classList.remove('show');
  }

  function clearMessages() {
    document.getElementById('auth-error').classList.remove('show');
    document.getElementById('auth-success').classList.remove('show');
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) return showError('Please fill in all fields');
    const { error } = await db.auth.signInWithPassword({ email, password });
    if (error) return showError(error.message);
    window.location.href = 'index.html';
  }

  async function handleSignup() {
    const username = document.getElementById('signup-username').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    if (!username || !email || !password) return showError('Please fill in all fields');
    if (password.length < 6) return showError('Password must be at least 6 characters');
    const { data, error } = await db.auth.signUp({ email, password, options: { data: { username } } });
    if (error) return showError(error.message);
    showSuccess('Account created! Check your email to confirm, then sign in.');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const tab = document.getElementById('form-login').style.display !== 'none' ? 'login' : 'signup';
      tab === 'login' ? handleLogin() : handleSignup();
    }
  });
</script>
</body>
</html>
